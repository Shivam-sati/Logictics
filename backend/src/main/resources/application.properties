spring.application.name=demo
# ─────────────────────────────────────────────
# Server
# ─────────────────────────────────────────────
server.port=8080

# ─────────────────────────────────────────────
# H2 In-Memory Database (no installation needed)
# ─────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:logisticsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Web Console (visit http://localhost:8080/h2-console to inspect DB live)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─────────────────────────────────────────────
# Python ML Service
# ─────────────────────────────────────────────
ml.service.url=http://localhost:5000/predict

# ─────────────────────────────────────────────
# Google Maps API Key
# Replace YOUR_API_KEY with your actual key
# Free tier is sufficient for demo
# ─────────────────────────────────────────────
google.maps.api.key= -

# ─────────────────────────────────────────────
# CORS — allow frontend to call backend
# ─────────────────────────────────────────────
allowed.origins=*

# ─────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────
logging.level.com.logistics=INFO